version: "2"
linters:
  enable:
    - misspell
    - revive
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
  settings:
    revive:
      rules:
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#var-naming
        # Disable due to use of ALL_CAPS consts.
        - name: var-naming
          disabled: true
formatters:
  exclusions:
    generated: lax
